# BFN Confidence Head Training V6 Phase 2 — Large Combined Training
# Continuation from V6 Phase 1 best checkpoint on ALL available datasets.
# V6 combines: V5 (V4 + Disease v2) + Brain Disease (26 categories)
#
# Dataset: 1,625 train / 407 val (2,032 unique, all available data)
#
# Usage:
#   python train.py configs/train/bfn_confidence_combined_v6_phase2.yml --finetune ./logs/bfn_confidence_combined_v6_phase1_2026_05_18__01_12_45/checkpoints/best.pt --device cuda --no_amp

model:
  type: antibody_bfn
  res_feat_dim: 256
  pair_feat_dim: 128
  diffusion:
    num_steps: 20
    beta: 1.0
    schedule: cosine
    eps_net_opt:
      num_layers: 6
  train_structure: true
  train_sequence: true
  ot_opt:
    num_iters: 5
  loss_weight:
    plddt: 1.0
    iptm: 2.5
    pae: 0.3
    train_recycles: 3
    mask_aug_prob: 0.6
    mask_aug_ratio: [0.3, 1.0]

train:
  loss_weights:
    plddt: 1.0
    iptm: 2.5
    pae: 0.3
  freeze_backbone: true
  unfreeze_encoder_layers: 4
  max_iters: 50000
  val_freq: 100
  log_freq: 20
  batch_size: 1
  warmup_steps: 800
  seed: 2027
  max_grad_norm: 1.0
  optimizer:
    type: adam
    lr: 3.e-5
    weight_decay: 0.0
    beta1: 0.9
    beta2: 0.999
  scheduler:
    type: plateau
    factor: 0.5
    patience: 50
    min_lr: 5.e-7

dataset:
  train:
    type: confidence_regression
    db_path: ./data/confidence_merged_v6/confidence_train.lmdb
  val:
    type: confidence_regression
    db_path: ./data/confidence_merged_v6/confidence_val.lmdb
