# BFN Confidence Head Training v5 — ipTM improvement + Disease-expanded data
# Dataset: v4 (503 train / 126 val) + Disease v2 (expanded, 1000+ entries)
# New in v5:
#   - Confidence mask augmentation: randomly masks residues during training
#     to close the train/design distribution gap for ipTM prediction
#   - train_recycles=3: stronger feedback signal through conf_embed/iptm_embed
#   - iptm loss_weight=2.5: increased emphasis on ipTM accuracy
#   - Disease dataset expanded from 242→1000+ entries for more ipTM diversity
#   - Lower LR (5e-5) for stable continued fine-tuning from v4
#
# Usage:
#   python train.py configs/train/bfn_confidence_combined_v5.yml --finetune <PATH_TO_V4_BEST.PT> --device cuda --no_amp

model:
  type: antibody_bfn
  res_feat_dim: 256
  pair_feat_dim: 128
  diffusion:
    num_steps: 20
    beta: 1.0
    schedule: cosine
    eps_net_opt:
      num_layers: 6
  train_structure: true
  train_sequence: true
  ot_opt:
    num_iters: 5
  loss_weight:
    plddt: 1.0
    iptm: 2.5
    pae: 0.3
    train_recycles: 3
    mask_aug_prob: 0.4
    mask_aug_ratio: [0.2, 1.0]

train:
  loss_weights:
    plddt: 1.0
    iptm: 2.5
    pae: 0.3
  freeze_backbone: true
  unfreeze_encoder_layers: 2
  max_iters: 20000
  val_freq: 100
  log_freq: 20
  batch_size: 1
  warmup_steps: 200
  seed: 2026
  max_grad_norm: 1.0
  optimizer:
    type: adam
    lr: 5.e-5
    weight_decay: 0.0
    beta1: 0.9
    beta2: 0.999
  scheduler:
    type: plateau
    factor: 0.5
    patience: 40
    min_lr: 1.e-6

dataset:
  train:
    type: confidence_regression
    db_path: ./data/confidence_merged_v5/confidence_train.lmdb
  val:
    type: confidence_regression
    db_path: ./data/confidence_merged_v5/confidence_val.lmdb
