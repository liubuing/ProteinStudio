# BFN Confidence Head Training v4 — IDP-augmented + Encoder unfrozen + Multi-recycle
# Dataset: v3 (474 train / 121 val) + IDP v2 (pseudo-disordered proteins)
# New in v4:
#   - IDP-augmented training data for disorder/order contrastive learning
#   - train_recycles=2: feedback embeddings receive gradient signal
#   - unfreeze_encoder_layers=2: last 2 GAEncoder blocks adapt to general proteins
#   - pLDDT head: Linear(256->128)->ReLU->Linear(128->32)->ReLU->Linear(32->1)
#
# Usage:
#   python train.py configs/train/bfn_confidence_combined_v4.yml --finetune <PATH_TO_BEST.PT> --device cuda --no_amp

model:
  type: antibody_bfn
  res_feat_dim: 256
  pair_feat_dim: 128
  diffusion:
    num_steps: 20
    beta: 1.0
    schedule: cosine
    eps_net_opt:
      num_layers: 6
  train_structure: true
  train_sequence: true
  ot_opt:
    num_iters: 5
  loss_weight:
    plddt: 1.0
    iptm: 1.0
    pae: 0.3
    train_recycles: 2

train:
  loss_weights:
    plddt: 1.0
    iptm: 1.0
    pae: 0.3
  freeze_backbone: true
  unfreeze_encoder_layers: 2
  max_iters: 30000
  val_freq: 100
  log_freq: 20
  batch_size: 1
  warmup_steps: 200
  seed: 2026
  max_grad_norm: 1.0
  optimizer:
    type: adam
    lr: 1.e-4
    weight_decay: 0.0
    beta1: 0.9
    beta2: 0.999
  scheduler:
    type: plateau
    factor: 0.5
    patience: 30
    min_lr: 1.e-6

dataset:
  train:
    type: confidence_regression
    db_path: ./data/confidence_merged_v4/confidence_train.lmdb
  val:
    type: confidence_regression
    db_path: ./data/confidence_merged_v4/confidence_val.lmdb
